name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          pip install PySide6 pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed --collect-all PySide6 --name LyraBrowser main.py

      - name: Copy blocklist
        run: copy blocklist.txt dist\blocklist.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LyraBrowser-Windows
          path: dist\
